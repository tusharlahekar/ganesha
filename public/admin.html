<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ganesha Admin</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="admin-header">
      <h1>Admin Dashboard</h1>
      <p class="notice">Manage products and review incoming orders.</p>
    </header>

    <main>
      <div class="admin-grid">
        <section>
          <h2>Latest orders</h2>
          <table class="table" id="ordersTable">
            <thead>
              <tr>
                <th>Order</th>
                <th>Customer</th>
                <th>Total</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </section>

        <section>
          <div class="form-card">
            <h2>Add new product</h2>
            <label>
              Name
              <input type="text" id="productName" />
            </label>
            <label>
              Description
              <textarea id="productDescription" rows="3"></textarea>
            </label>
            <label>
              Price (cents)
              <input type="number" id="productPrice" />
            </label>
            <label>
              Image URL
              <input type="url" id="productImage" />
            </label>
            <button id="addProduct">Add product</button>
            <p class="notice" id="productStatus"></p>
          </div>
        </section>
      </div>

      <section>
        <h2>Active products</h2>
        <table class="table" id="productsTable">
          <thead>
            <tr>
              <th>Product</th>
              <th>Price</th>
              <th>Status</th>
              <th></th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </section>
    </main>

    <script src="/admin.js"></script>
  </body>
</html>
